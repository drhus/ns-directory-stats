<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network School Directory Stats</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #141420;
    --surface2: #1c1c2e;
    --border: #2a2a40;
    --text: #e0e0e8;
    --muted: #8888a0;
    --accent: #6366f1;
    --accent2: #a78bfa;
    --green: #34d399;
    --orange: #fb923c;
    --pink: #f472b6;
    --cyan: #22d3ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .header { text-align: center; margin-bottom: 3rem; }
  .header h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  .header p { color: var(--muted); font-size: 0.95rem; }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }
  .kpi .value { font-size: 2rem; font-weight: 800; color: var(--accent2); }
  .kpi .label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi.green .value { color: var(--green); }
  .kpi.orange .value { color: var(--orange); }
  .kpi.pink .value { color: var(--pink); }
  .kpi.cyan .value { color: var(--cyan); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .card canvas { max-height: 320px; }
  .card.wide { grid-column: 1 / -1; }
  .card.tall canvas { max-height: 500px; }
  .badge-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .badge strong { color: var(--text); margin-left: 0.3rem; }
  .section-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent2);
    margin: 2.5rem 0 1.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  table.member-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  table.member-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
  }
  table.member-table td {
    padding: 0.4rem 0.75rem;
    border-bottom: 1px solid var(--surface2);
    color: var(--text);
  }
  table.member-table tr:hover td { background: var(--surface2); }
  .tag {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .tag.f { background: #f472b620; color: var(--pink); }
  .tag.m { background: #22d3ee20; color: var(--cyan); }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent2); text-decoration: none; }
  #loading { text-align: center; padding: 4rem; font-size: 1.2rem; color: var(--muted); }
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>Network School Directory</h1>
  <p>Member analytics dashboard — data scraped 2026-06-05 via Browser Use Cloud</p>
</div>
<div id="loading">Loading...</div>
<div id="app" style="display:none"></div>

<script>
const C = {
  purple:'#6366f1', violet:'#a78bfa', pink:'#f472b6', cyan:'#22d3ee',
  green:'#34d399', orange:'#fb923c', yellow:'#fbbf24', red:'#f87171',
  blue:'#60a5fa', teal:'#2dd4bf', indigo:'#818cf8', rose:'#fb7185',
};
const PAL = Object.values(C);
Chart.defaults.color = '#8888a0';
Chart.defaults.borderColor = '#2a2a40';
Chart.defaults.font.family = "'Inter', sans-serif";

fetch('stats.json').then(r => r.json()).then(d => {
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';

  const longTerm = d.types['long-term'] || 0;
  const core = d.types['core'] || 0;
  const regular = d.types['member'] || 0;
  const ocg = d.onCampusGender || {};

  // Build recent LT table rows
  const ltRows = (d.recentLongTermers || []).map(m =>
    `<tr><td>${m.name}</td><td>${m.joined}</td><td><span class="tag ${m.gender==='female'?'f':'m'}">${m.gender||'?'}</span></td><td>${m.location||'—'}</td></tr>`
  ).join('');

  // Build female LT table rows
  const fltRows = (d.longTermFemaleList || []).map(m =>
    `<tr><td>${m.name}</td><td>${m.joined}</td><td>${m.location||'—'}</td></tr>`
  ).join('');

  app.innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="value">${d.total.toLocaleString()}</div><div class="label">Total Members</div></div>
      <div class="kpi green"><div class="value">${d.onCampus}</div><div class="label">On Campus</div></div>
      <div class="kpi orange"><div class="value">${longTerm}</div><div class="label">Long-Term</div></div>
      <div class="kpi pink"><div class="value">${core}</div><div class="label">Core Team</div></div>
      <div class="kpi cyan"><div class="value">${d.thisMonth}</div><div class="label">Joined Jun '26</div></div>
      <div class="kpi"><div class="value">${d.lastMonth}</div><div class="label">Joined May '26</div></div>
      <div class="kpi pink"><div class="value">${d.gender.female}</div><div class="label">Female Total</div></div>
      <div class="kpi cyan"><div class="value">${d.countries.length}</div><div class="label">Countries</div></div>
      <div class="kpi pink"><div class="value">${ocg.female||0}</div><div class="label">Female On Campus</div></div>
      <div class="kpi orange"><div class="value">${d.longTermFemale||0}</div><div class="label">Female Long-Term</div></div>
    </div>

    <div class="grid">
      <div class="card wide"><h3>Member Growth — Monthly Joins</h3><canvas id="cGrowth"></canvas></div>

      <div class="card wide"><h3>Long-Termers — Monthly Trend (Total vs Female)</h3><canvas id="cLTMonthly"></canvas></div>

      <div class="card"><h3>On Campus — Gender Split</h3><canvas id="cOCGender"></canvas></div>
      <div class="card"><h3>Member Type</h3><canvas id="cTypes"></canvas></div>

      <div class="card"><h3>Overall Gender</h3><canvas id="cGender"></canvas></div>
      <div class="card"><h3>Social Platforms</h3><canvas id="cSocials"></canvas></div>

      <div class="card"><h3>Roles (from Experience)</h3><canvas id="cRoles"></canvas></div>
      <div class="card"><h3>Top 15 Countries</h3><canvas id="cCountries"></canvas></div>

      <div class="card"><h3>Top 15 Cities</h3><canvas id="cCities"></canvas></div>
      <div class="card"><h3>Profile Completeness</h3><canvas id="cComplete"></canvas></div>
    </div>

    <div class="section-title">Recent Long-Termers (Mar–Jun 2026) — ${(d.recentLongTermers||[]).length} members</div>
    <div class="card wide" style="overflow-x:auto">
      <table class="member-table">
        <thead><tr><th>Name</th><th>Joined</th><th>Gender</th><th>Location</th></tr></thead>
        <tbody>${ltRows}</tbody>
      </table>
    </div>

    <div class="section-title">All Female Long-Termers — ${d.longTermFemale||0} of ${d.longTermTotal||0}</div>
    <div class="card wide" style="overflow-x:auto">
      <table class="member-table">
        <thead><tr><th>Name</th><th>Joined</th><th>Location</th></tr></thead>
        <tbody>${fltRows}</tbody>
      </table>
    </div>

    <div class="section-title">Recent Members Social Platforms (May–Jun 2026) — ${d.recentMembersCount||0} members</div>
    <div class="grid">
      <div class="card"><h3>Social Presence (Recent Members)</h3><canvas id="cRecentSocials"></canvas></div>
      <div class="card"><h3>Recent vs All — Social Comparison</h3><canvas id="cSocialCompare"></canvas></div>
    </div>

    <div class="section-title">Recent Members with X Accounts — ${(d.recentXMembers||[]).length} handles</div>
    <div class="card wide" style="overflow-x:auto;max-height:500px;overflow-y:auto">
      <table class="member-table">
        <thead><tr><th>Name</th><th>X Handle</th><th>Joined</th><th>Type</th><th>Role</th></tr></thead>
        <tbody>${(d.recentXMembers||[]).map(m =>
          '<tr><td>'+m.name+'</td><td><a href="https://x.com/'+m.handle+'" target="_blank" style="color:'+C.cyan+'">@'+m.handle+'</a></td><td>'+m.joined+'</td><td>'+(m.type==='long-term'?'<span class="tag" style="background:#fb923c20;color:#fb923c">LT</span>':m.type==='core'?'<span class="tag" style="background:#f472b620;color:#f472b6">CORE</span>':'')+'</td><td style="color:#8888a0;font-size:0.8rem">'+m.job+'</td></tr>'
        ).join('')}</tbody>
      </table>
    </div>

    <div class="grid" style="margin-top:2rem">
      <div class="card wide"><h3>All Countries</h3><div class="badge-grid" id="badges"></div></div>
    </div>

    <div class="footer">Data scraped from NS directory on 2026-06-05 using <a href="https://cloud.browser-use.com/" target="_blank">Browser Use Cloud</a></div>
  `;

  // === CHARTS ===

  // Growth
  const months = d.monthlyJoins;
  new Chart(document.getElementById('cGrowth'), {
    type:'bar',
    data:{
      labels: months.map(m=>m[0]),
      datasets:[
        {label:'New Members', data:months.map(m=>m[1]), backgroundColor:months.map(m=>m[0]==='2026-06'?C.green:C.purple), borderRadius:4},
        {label:'Cumulative', data:months.reduce((a,m)=>{a.push((a.length?a[a.length-1]:0)+m[1]);return a;},[]), type:'line', borderColor:C.pink, backgroundColor:'transparent', pointBackgroundColor:C.pink, tension:0.3, yAxisID:'y1'}
      ]
    },
    options:{responsive:true, interaction:{mode:'index',intersect:false}, scales:{y:{beginAtZero:true,title:{display:true,text:'New/Month'}},y1:{position:'right',beginAtZero:true,title:{display:true,text:'Cumulative'},grid:{display:false}}}}
  });

  // Long-Term monthly trend
  const ltMonths = d.longTermByMonth || [];
  const ltfMonths = d.longTermFemaleByMonth || [];
  const allLTLabels = [...new Set([...ltMonths.map(m=>m[0]), ...ltfMonths.map(m=>m[0])])].sort();
  const ltMap = Object.fromEntries(ltMonths);
  const ltfMap = Object.fromEntries(ltfMonths);
  new Chart(document.getElementById('cLTMonthly'), {
    type:'bar',
    data:{
      labels: allLTLabels,
      datasets:[
        {label:'Long-Term Total', data:allLTLabels.map(l=>ltMap[l]||0), backgroundColor:C.orange, borderRadius:4},
        {label:'Long-Term Female', data:allLTLabels.map(l=>ltfMap[l]||0), backgroundColor:C.pink, borderRadius:4},
      ]
    },
    options:{responsive:true, interaction:{mode:'index',intersect:false}, scales:{y:{beginAtZero:true}}}
  });

  // On Campus Gender
  new Chart(document.getElementById('cOCGender'), {
    type:'doughnut',
    data:{labels:['Male','Female','Unknown'], datasets:[{data:[ocg.male||0,ocg.female||0,ocg.unknown||0], backgroundColor:[C.cyan,C.pink,C.violet], borderWidth:0}]},
    options:{responsive:true, plugins:{legend:{position:'bottom'}}}
  });

  // Types
  new Chart(document.getElementById('cTypes'), {
    type:'doughnut',
    data:{labels:['Regular','Long-Term','Core'], datasets:[{data:[regular,longTerm,core], backgroundColor:[C.purple,C.orange,C.pink], borderWidth:0}]},
    options:{responsive:true, plugins:{legend:{position:'bottom'}}}
  });

  // Gender
  new Chart(document.getElementById('cGender'), {
    type:'doughnut',
    data:{labels:['Male','Female','Unknown'], datasets:[{data:[d.gender.male,d.gender.female,d.gender.unknown], backgroundColor:[C.cyan,C.pink,C.violet], borderWidth:0}]},
    options:{responsive:true, plugins:{legend:{position:'bottom'}}}
  });

  // Socials
  new Chart(document.getElementById('cSocials'), {
    type:'bar',
    data:{labels:d.socials.map(s=>s[0]), datasets:[{data:d.socials.map(s=>s[1]), backgroundColor:PAL, borderRadius:4}]},
    options:{responsive:true, indexAxis:'y', plugins:{legend:{display:false}}}
  });

  // Roles
  new Chart(document.getElementById('cRoles'), {
    type:'bar',
    data:{labels:d.roles.map(r=>r[0]), datasets:[{data:d.roles.map(r=>r[1]), backgroundColor:PAL.slice(3), borderRadius:4}]},
    options:{responsive:true, indexAxis:'y', plugins:{legend:{display:false}}}
  });

  // Countries
  const top15c = d.countries.slice(0,15);
  new Chart(document.getElementById('cCountries'), {
    type:'bar',
    data:{labels:top15c.map(c=>c[0]), datasets:[{data:top15c.map(c=>c[1]), backgroundColor:C.violet, borderRadius:4}]},
    options:{responsive:true, indexAxis:'y', plugins:{legend:{display:false}}}
  });

  // Cities
  new Chart(document.getElementById('cCities'), {
    type:'bar',
    data:{labels:d.cities.map(c=>c[0]), datasets:[{data:d.cities.map(c=>c[1]), backgroundColor:C.cyan, borderRadius:4}]},
    options:{responsive:true, indexAxis:'y', plugins:{legend:{display:false}}}
  });

  // Completeness
  new Chart(document.getElementById('cComplete'), {
    type:'bar',
    data:{labels:['Has Socials','Custom Bio','Has Experience','Has Education'], datasets:[{data:[d.completeness.socials,d.completeness.bio,d.completeness.experience,d.completeness.education], backgroundColor:[C.green,C.cyan,C.violet,C.orange], borderRadius:6}]},
    options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,max:d.totalProfiles}}}
  });

  // Recent Socials
  const rs = d.recentSocials || [];
  new Chart(document.getElementById('cRecentSocials'), {
    type:'bar',
    data:{labels:rs.map(s=>s[0]), datasets:[{data:rs.map(s=>s[1]), backgroundColor:PAL, borderRadius:4}]},
    options:{responsive:true, indexAxis:'y', plugins:{legend:{display:false}}}
  });

  // Social comparison: recent vs all
  const allSocMap = Object.fromEntries(d.socials);
  const recSocMap = Object.fromEntries(rs);
  const compLabels = [...new Set([...d.socials.map(s=>s[0]), ...rs.map(s=>s[0])])].sort((a,b)=>(allSocMap[b]||0)-(allSocMap[a]||0));
  new Chart(document.getElementById('cSocialCompare'), {
    type:'bar',
    data:{
      labels: compLabels,
      datasets:[
        {label:'All Members %', data:compLabels.map(l=>Math.round(((allSocMap[l]||0)/d.totalProfiles)*100)), backgroundColor:C.purple, borderRadius:4},
        {label:'Recent (May-Jun) %', data:compLabels.map(l=>Math.round(((recSocMap[l]||0)/d.recentMembersCount)*100)), backgroundColor:C.green, borderRadius:4},
      ]
    },
    options:{responsive:true, indexAxis:'y', plugins:{legend:{position:'top'}}, scales:{x:{title:{display:true,text:'% of members'}}}}
  });

  // Badges
  const b = document.getElementById('badges');
  d.countries.forEach(([n,c])=>{ b.innerHTML+=`<span class="badge">${n}<strong>${c}</strong></span>`; });

}).catch(e => { document.getElementById('loading').textContent = 'Error: '+e.message; });
</script>
</body>
</html>
